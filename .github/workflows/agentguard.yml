name: AgentGuard Security Scan

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install AgentGuard
        run: pip install agentguardp
      - name: Run AgentGuard Scan
        run: agentguard scan . --format json -o agentguard-report.json
      - name: Show Report
        run: cat agentguard-report.json | python -m json.tool | head -50
